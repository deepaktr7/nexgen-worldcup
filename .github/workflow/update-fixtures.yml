name: Update World Cup fixtures

# Runs a few times a day so results post within hours of full-time,
# and upcoming kickoff times stay fresh. Adjust the cron times if you like.
# Times are UTC. (Dubai = UTC+4.)
on:
  schedule:
    - cron: "0 6 * * *"    # 10:00 Dubai
    - cron: "0 14 * * *"   # 18:00 Dubai
    - cron: "0 22 * * *"   # 02:00 Dubai (catches late US-timezone matches)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch fixtures and results
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node fetch-fixtures.js
      - name: Commit fixtures.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fixtures.json
          git diff --staged --quiet || git commit -m "Update fixtures $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
